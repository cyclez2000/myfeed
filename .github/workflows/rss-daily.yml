name: RSS Daily Digest

on:
  schedule:
    # 每天 UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install feed CLI
        run: |
          curl -sL https://github.com/odysseus0/feed/releases/download/v0.2.0/feed_0.2.0_linux_amd64.tar.gz | tar xz
          sudo mv feed /usr/local/bin/
          feed --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -q google-genai
          echo "Dependencies installed"

      - name: Import feeds
        run: feed import feeds.opml

      - name: Fetch feeds
        run: feed fetch
        continue-on-error: true

      - name: Export entries to JSON
        run: feed get entries -o json --limit 100 > data/entries.json

      - name: Check secrets
        run: |
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "::warning::GOOGLE_API_KEY is empty. AI summary will be skipped."
          else
            echo "GOOGLE_API_KEY is set (length: ${#GOOGLE_API_KEY})"
          fi
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Generate daily report
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python scripts/generate_report.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/daily/ data/entries.json
          git diff --staged --quiet || git commit -m "📰 Daily digest $(date +%Y-%m-%d)"
          git push
